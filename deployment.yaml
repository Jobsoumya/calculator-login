apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calculator-app
  template:
    metadata:
      labels:
        app: calculator-app
    spec:
      containers:
      - image: ghcr.io/jobsoumya/calculator-app:latest
        name: calculator-app
        ports:
        - containerPort: 3000

