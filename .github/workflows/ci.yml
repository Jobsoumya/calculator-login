name: CI Pipeline

on:
  push:
    branches:
      - main
      - "feature/*"

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: docker build -t ghcr.io/jobsoumya/calculator-login:v2 .

      - name: Push Image
        run: docker push ghcr.io/jobsoumya/calculator-login:v2
